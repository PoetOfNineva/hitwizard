[build]
  publish = "."
  functions = "functions"
  edge_functions = "netlify/edge-functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,KEEPALIVE_SECRET,ADMIN_SECRET"

# ── SCHEDULED FUNCTIONS ──
[functions."supabase-keepalive"]
  schedule = "0 9 */3 * *"

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/auth/callback"
  to = "/auth/callback/index.html"
  status = 200

[[redirects]]
  from = "/auth/reset"
  to = "/index.html"
  status = 200

[[edge_functions]]
  path = "/api/claude"
  function = "claude"

[[edge_functions]]
  path = "/api/stripe-checkout"
  function = "stripe-checkout"

[[edge_functions]]
  path = "/api/stripe-webhook"
  function = "stripe-webhook"

[[edge_functions]]
  path = "/api/spotify-fetch"
  function = "spotify-fetch"

[[edge_functions]]
  path = "/api/genius-fetch"
  function = "genius-fetch"

[[edge_functions]]
  path = "/api/youtube-fetch"
  function = "youtube-fetch"

[[edge_functions]]
  path = "/api/apple-fetch"
  function = "apple-fetch"

[[edge_functions]]
  path = "/l/*"
  function = "smart-link-page"

[[edge_functions]]
  path = "/api/track-click"
  function = "track-click"

# Serve TikTok verification file as plain text
[[headers]]
  for = "/*.txt"
  [headers.values]
    Content-Type = "text/plain"

# Explicitly serve the TikTok verification file
[[redirects]]
  from = "/tiktokYopvycw09CJhkdLwt5TielyLm1wKfeS1.txt"
  to = "/tiktokYopvycw09CJhkdLwt5TielyLm1wKfeS1.txt"
  status = 200
  force = true

# cache-bust: spotify-web-api-v2-1782431780
