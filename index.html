<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HitWizard — AI Music Marketing</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#08080E;color:#F0F0F0;font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#08080E}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#FFB800,#7B2FBE);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,184,0,0.2)}50%{box-shadow:0 0 40px rgba(255,184,0,0.5)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.hw{min-height:100vh;background:var(--bg)}
.gbg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,184,0,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,184,0,0.025) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:0}
.orb1{position:fixed;width:600px;height:600px;top:-150px;left:-150px;background:radial-gradient(circle,rgba(255,184,0,0.04),transparent 70%);pointer-events:none;z-index:0}
.orb2{position:fixed;width:500px;height:500px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(123,47,190,0.06),transparent 70%);pointer-events:none;z-index:0}
.side{position:fixed;left:0;top:0;bottom:0;width:242px;background:rgba(8,8,14,.97);border-right:1px solid var(--bdr);z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.slogo{padding:22px 18px;border-bottom:1px solid var(--bdr)}

.hero{background:linear-gradient(135deg,rgba(255,184,0,.07),rgba(123,47,190,.07));border:1px solid rgba(255,184,0,.18);border-radius:13px;padding:26px;margin-bottom:22px;position:relative;overflow:hidden;animation:fadeUp .5s ease}
.hero::after{content:'✦';position:absolute;right:26px;top:50%;transform:translateY(-50%);font-size:66px;color:rgba(255,184,0,.05);animation:float 5s ease-in-out infinite;pointer-events:none}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}

.dl-bar{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}
.pc{background:rgba(22,22,42,.8);border:1px solid var(--bdr);border-radius:13px;padding:24px;text-align:center;transition:all .3s;position:relative;overflow:hidden}

.pc-val{font-family:'Cinzel',serif;font-size:36px;font-weight:900;color:var(--gold)}

.pc-list{list-style:none;text-align:left;margin:13px 0}

.pc-list li::before{content:'✦';color:var(--gold);font-size:9px;flex-shrink:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#10101A;border:1px solid rgba(255,184,0,.3);border-radius:13px;width:100%;max-width:680px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{padding:15px 19px;border-bottom:1px solid rgba(255,184,0,.12);display:flex;align-items:center;justify-content:space-between}

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

// ── SAFE COPY ──
function safeCopy(text){
  if(navigator.clipboard&&window.isSecureContext){
    return navigator.clipboard.writeText(text).catch(()=>fbCopy(text));
  }
  return fbCopy(text);
}
function fbCopy(text){
  return new Promise(res=>{
    const el=document.createElement("textarea");
    el.value=text;el.style.cssText="position:fixed;top:-9999px;left:-9999px;opacity:0";
    document.body.appendChild(el);el.focus();el.select();
    document.execCommand("copy");document.body.removeChild(el);res();
  });
}

// ── EXPORT MODAL ──
function toText(r,title){
  let o=`HITWIZARD — ${title}\nGenerated: ${new Date().toLocaleString()}\n${"=".repeat(60)}\n\n`;
  const walk=obj=>{for(const[k,v]of Object.entries(obj||{})){if(typeof v==="string")o+=`[${k.toUpperCase()}]\n${v}\n\n`;else if(Array.isArray(v))o+=`[${k.toUpperCase()}]\n${v.join("\n")}\n\n`;else if(v&&typeof v==="object"){o+=`\n--- ${k.toUpperCase()} ---\n`;walk(v);}}};
  walk(r);return o;
}
function DownloadModal({content,filename,onClose}){
  if(!content)return null;
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <div style={{fontFamily:"Cinzel,serif",fontSize:14,fontWeight:700,color:"var(--gold)"}}>⬇ {filename}</div>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Click inside the text box → press Cmd+A to select all → Cmd+C to copy → paste into any text editor and save</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕ Close</button>
        </div>
        <div className="modal-body">
          <textarea readOnly value={content} onClick={e=>e.target.select()} style={{width:"100%",minHeight:380,background:"#08080E",border:"1px solid rgba(255,184,0,.15)",borderRadius:7,padding:12,color:"#F0F0F0",fontFamily:"JetBrains Mono,monospace",fontSize:11,lineHeight:1.8,resize:"none",outline:"none"}}/>
        </div>
        <div className="modal-foot">
          <button className="btn btn-gold" onClick={()=>safeCopy(content).then(()=>alert("Copied! Now paste into Notepad or TextEdit and save as a .txt file."))}>📋 Copy Everything</button>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

// ── AI CALL ──
async function hwAI(sys,usr,retries=2){
  for(let i=0;i<=retries;i++){
    try{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),55000);
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","anthropic-beta":"claude-ai-artifacts-2025-05-06"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system:sys,messages:[{role:"user",content:usr}]}),
        signal:ctrl.signal
      });
      clearTimeout(t);
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`Something went wrong (${res.status}). Please try again.`);}
      const d=await res.json();
      if(!d.content?.[0]?.text)throw new Error("No response received. Please try again.");
      return d.content[0].text.replace(/```json\s*/gi,"").replace(/```\s*/gi,"").trim();
    }catch(e){if(i===retries)throw e;await new Promise(r=>setTimeout(r,1500*(i+1)));}
  }
}
function parseJ(raw){
  try{return JSON.parse(raw);}
  catch{const m=raw.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);throw new Error("Could not read the AI response. Please try again.");}
}

// ── SHARED COMPONENTS ──
function Toast({msg,icon,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,4000);return()=>clearTimeout(t);},[]);
  return <div className="toast"><span>{icon||"✦"}</span><span>{msg}</span></div>;
}
function CopyBtn({text,st}){
  const[done,setDone]=useState(false);
  const go=()=>{safeCopy(text).then(()=>{setDone(true);st("Copied to clipboard!","✓");setTimeout(()=>setDone(false),2000)}).catch(()=>st("Please select and copy the text manually","⚠️"));};
  return <button className="btn btn-ghost btn-sm rbox-cp" onClick={go} style={done?{color:"var(--ok)",borderColor:"rgba(0,229,153,.3)"}:{}}>{done?"✓ Copied!":"Copy"}</button>;
}
function RBox({label,value,icon="",warn,color,st}){
  if(!value)return null;
  return(
    <div className={`rbox ${warn?"rbox-warn":""}`}>
      <div className="rbox-lbl" style={color?{color}:{}}>{icon} {label}</div>
      <div className="rbox-txt">{value}</div>
      <CopyBtn text={value} st={st}/>
    </div>
  );
}
function ErrBox({msg}){if(!msg)return null;return <div className="ebox">⚠️ {msg}</div>;}

// ── SPOTIFY + AUDIO FETCH PANEL ──
function LyricsPanel({onFetched,st}){
  const[url,setUrl]=useState("");
  const[loading,setLoading]=useState(false);
  const[transcribing,setTranscribing]=useState(false);
  const[err,setErr]=useState("");
  const[preview,setPreview]=useState(null);
  const fileRef=useRef();

  const fetchSpotify=async()=>{
    if(!url.includes("spotify.com/track/")){setErr("Please paste a Spotify track link. Example: open.spotify.com/track/...");return;}
    setErr("");setLoading(true);setPreview(null);
    try{
      const match=url.match(/track\/([a-zA-Z0-9]+)/);
      if(!match)throw new Error("Could not find the track ID in that link. Please check and try again.");
      const trackId=match[1];
      let songTitle="",artistName="",thumb="";
      try{
        const r=await fetch(`https://open.spotify.com/oembed?url=https://open.spotify.com/track/${trackId}`);
        if(r.ok){const d=await r.json();const t=d.title||"";if(t.includes(" · ")){[songTitle,artistName]=t.split(" · ");}else songTitle=t;thumb=d.thumbnail_url||"";}
      }catch{}
      st("Fetching lyrics from AI...","🔍");
      const lyrics=await hwAI(
        "You are a music expert. Provide full song lyrics with section labels like [Verse 1], [Chorus], [Bridge]. If you are not sure about the exact lyrics, start your response with: ⚠️ APPROXIMATE — please check and correct these before using.",
        `Please provide the full lyrics for: "${songTitle||"Unknown"}" by ${artistName||"Unknown"}\nInclude proper section labels. Just the lyrics — no extra commentary.`
      );
      setPreview({songTitle:songTitle||"Unknown Title",artistName:artistName||"Unknown Artist",lyrics,thumb});
      st("Lyrics ready! Review them below before approving.","✓");
    }catch(e){setErr(`Could not fetch: ${e.message}`);}
    setLoading(false);
  };

  const handleAudioUpload=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const maxSize=50*1024*1024;
    if(file.size>maxSize){setErr("File is too large. Maximum size is 50MB.");return;}
    setErr("");setTranscribing(true);setPreview(null);
    st("Listening to your audio and transcribing...","🎵");
    try{
      const formData=new FormData();
      formData.append("file",file);
      formData.append("model","whisper-1");
      const res=await fetch("https://api.openai.com/v1/audio/transcriptions",{
        method:"POST",
        headers:{"Authorization":"Bearer OPENAI_KEY_HERE"},
        body:formData
      });
      if(!res.ok)throw new Error("Audio transcription failed. Please try pasting your lyrics manually instead.");
      const data=await res.json();
      const lyrics=data.text||"";
      setPreview({songTitle:file.name.replace(/\.[^.]+$/,""),artistName:"",lyrics:`[Transcribed from audio]\n\n${lyrics}`,thumb:""});
      st("Audio transcribed! Review the lyrics below.","✓");
    }catch(e){setErr(`Audio transcription failed: ${e.message}. Please paste your lyrics manually below.`);}
    setTranscribing(false);
  };

  const approve=()=>{if(preview){onFetched(preview);setPreview(null);setUrl("");}};

  return(
    <div className="sp-panel">
      <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"var(--gold)",fontFamily:"JetBrains Mono,monospace",marginBottom:10}}>
        🎵 GET YOUR LYRICS AUTOMATICALLY <span style={{color:"var(--muted)",fontFamily:"DM Sans,sans-serif",fontWeight:400,letterSpacing:0,textTransform:"none",fontSize:11,marginLeft:5}}>— or scroll down to paste them manually</span>
      </div>
      {err&&<div style={{background:"rgba(255,68,102,.08)",border:"1px solid rgba(255,68,102,.25)",borderRadius:6,padding:"7px 11px",marginBottom:9,fontSize:12,color:"var(--err)"}}>{err}</div>}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input className="inp" style={{flex:1}} placeholder="Paste your Spotify track link here..." value={url} onChange={e=>setUrl(e.target.value)} onKeyDown={e=>e.key==="Enter"&&fetchSpotify()}/>
        <button className="btn btn-gold" onClick={fetchSpotify} disabled={loading||transcribing} style={{flexShrink:0}}>
          {loading?<><span className="loader"/> Looking up...</>:"🔍 Find Lyrics"}
        </button>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <div style={{flex:1,height:1,background:"var(--bdr)"}}/>
        <span style={{fontSize:11,color:"var(--muted)"}}>or upload your audio file</span>
        <div style={{flex:1,height:1,background:"var(--bdr)"}}/>
      </div>
      <input ref={fileRef} type="file" accept=".mp3,.wav,.m4a,.flac,.ogg" onChange={handleAudioUpload} style={{display:"none"}}/>
      <button className="btn btn-ghost btn-full" onClick={()=>fileRef.current?.click()} disabled={transcribing||loading}>
        {transcribing?<><span className="loader"/> Listening to your audio...</>:"🎤 Upload Audio File (MP3, WAV, M4A) — AI will transcribe lyrics"}
      </button>
      {preview&&(
        <div className="sp-preview">
          <div style={{display:"flex",gap:11,alignItems:"center",marginBottom:11}}>
            {preview.thumb&&<img src={preview.thumb} alt="" style={{width:44,height:44,borderRadius:5,objectFit:"cover"}}/>}
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"var(--txt)"}}>{preview.songTitle}</div>
              {preview.artistName&&<div style={{fontSize:12,color:"var(--muted)"}}>{preview.artistName}</div>}
            </div>
            <span className="badge b-ok" style={{marginLeft:"auto"}}>FETCHED</span>
          </div>
          <div style={{fontSize:10,color:"var(--gold)",letterSpacing:2,textTransform:"uppercase",fontFamily:"JetBrains Mono,monospace",marginBottom:5}}>
            Review and fix any errors before approving
          </div>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:8}}>AI-generated lyrics can have mistakes — especially for newer or independent songs. Always double-check.</div>
          <textarea value={preview.lyrics} onChange={e=>setPreview(p=>({...p,lyrics:e.target.value}))} style={{width:"100%",minHeight:160,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,184,0,.15)",borderRadius:6,padding:9,color:"var(--txt)",fontFamily:"JetBrains Mono,monospace",fontSize:11,lineHeight:1.8,resize:"vertical",outline:"none"}}/>
          <div style={{display:"flex",gap:8,marginTop:9}}>
            <button className="btn btn-ok" onClick={approve}>✓ Looks Good — Fill My Form</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPreview(null)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── VIDEO PRODUCTION ENGINE ──
function VideoEngine({showToast}){
  const[chars,setChars]=useState(DEFAULT_CHARACTERS);
  const[form,setForm]=useState({songTitle:"",duration:"210",lyrics:"",videoType:"60s-ad",selectedChars:[],clipLength:"10"});
  const[results,setResults]=useState(null);
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[dlData,setDlData]=useState(null);
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const toggleChar=(id)=>setForm(p=>({...p,selectedChars:p.selectedChars.includes(id)?p.selectedChars.filter(x=>x!==id):[...p.selectedChars,id]}));

  const videoTypes=[
    {id:"15s-ad",label:"15-Second Ad",desc:"Instagram / TikTok",secs:15},
    {id:"30s-ad",label:"30-Second Ad",desc:"TikTok / YouTube",secs:30},
    {id:"60s-ad",label:"60-Second Ad",desc:"YouTube / Facebook",secs:60},
    {id:"90s-teaser",label:"90-Second Teaser",desc:"Full preview",secs:90},
    {id:"full-mv",label:"Full Music Video",desc:"Uses song duration",secs:null},
  ];

  const getSeconds=()=>{
    const vt=videoTypes.find(v=>v.id===form.videoType);
    return vt?.secs||parseInt(form.duration)||210;
  };

  const getClipCount=()=>Math.ceil(getSeconds()/parseInt(form.clipLength||10));

  const selectedCharData=DEFAULT_CHARACTERS.filter(c=>form.selectedChars.includes(c.id));

  const buildCharBlock=(charIds)=>{
    const selected=DEFAULT_CHARACTERS.filter(c=>charIds.includes(c.id));
    if(!selected.length)return"";
    const count=selected.length;
    const charDescs=selected.map(c=>`${c.dna}`).join(",\n");
    const tags=selected.map(c=>c.tag).join(", ");
    return`EXACTLY ${count} ${count===1?"PERSON":"PEOPLE"} in this scene,\n${charDescs},\n...[scene details, camera, lighting]...\n${tags},\n9:16 vertical format, photorealistic cinematic quality`;
  };

  const generate=async()=>{
    if(!form.lyrics){setErr("Please paste your lyrics first — the AI needs them to plan your video.");return;}
    if(!form.selectedChars.length){setErr("Please select at least one character for this video.");return;}
    setErr("");setLoading(true);setResults(null);
    try{
      const totalSecs=getSeconds();
      const clipLen=parseInt(form.clipLength||10);
      const totalClips=Math.ceil(totalSecs/clipLen);
      const arollCount=Math.ceil(totalClips*0.65);
      const brollCount=totalClips-arollCount;
      const charDNA=selectedCharData.map(c=>`${c.name}: ${c.dna}, ${c.tag}`).join("\n\n");

      const raw=await hwAI(
        `You are an expert AI music video director. You understand that Grok AI generates ${clipLen}-second video clips. You must plan the exact number of clips needed and write complete ready-to-use Grok prompts for each one. Always use FULL character description tags — never just a name. Always include warm golden lighting. Always use TRACKING CAMERA that moves, never static. Always include micro-movements. Always start multi-character prompts with EXACTLY N PEOPLE in this scene. Describe Celinenya first always. Include all consistency tags at the end. Respond ONLY with valid JSON.`,
        `Create a complete video shooting script.

Song: "${form.songTitle||"My Song"}"
Video type: ${form.videoType} (${totalSecs} seconds)
Clip length: ${clipLen} seconds each
Total clips needed: ${totalClips} (${arollCount} A-roll performance clips, ${brollCount} B-roll story clips)

CHARACTER DNA TO USE IN EVERY PROMPT:
${charDNA}

LYRICS:
${form.lyrics}

RULES FOR EVERY PROMPT:
- Full character DNA tags every time — never just use the name
- TRACKING CAMERA always moving — never static
- Warm golden lighting every clip
- Micro-movements: head tilts, eye shifts, breathing visible
- EXACTLY N PEOPLE declaration for multi-character scenes
- Celinenya always described first
- All consistency tags at end of every prompt
- 9:16 vertical format
- 250-300 words per prompt maximum

Detect A-roll vs B-roll automatically:
- A-roll = artist performing/singing to camera
- B-roll = story scene acting out lyric narrative (third person language, action events, location references)

Return ONLY this JSON:
{
  "songTitle": "title",
  "totalClips": ${totalClips},
  "arollCount": ${arollCount},
  "brollCount": ${brollCount},
  "totalSeconds": ${totalSecs},
  "clipLength": ${clipLen},
  "grokInstructions": "plain English instructions for the artist about how to use these prompts in Grok",
  "capCutGuide": "plain English CapCut assembly instructions",
  "clips": [
    {
      "number": 1,
      "timestamp": "0:00 - 0:${clipLen}",
      "type": "A-ROLL",
      "characters": ["Celinenya"],
      "lyricMoment": "the lyric line this clip covers",
      "sceneDescription": "what happens visually",
      "grokPrompt": "the complete ready-to-paste Grok prompt with full character DNA"
    }
  ]
}`
      );
      const p=parseJ(raw);
      setResults(p);
      showToast(`Shooting script ready! ${p.totalClips} clips generated.`,"🎬");
    }catch(e){setErr(`Script generation failed: ${e.message}`);}
    setLoading(false);
  };

  return(
    <div>
      {dlData&&<DownloadModal content={dlData.c} filename={dlData.n} onClose={()=>setDlData(null)}/>}
      <div style={{background:"rgba(255,184,0,.04)",border:"1px solid rgba(255,184,0,.15)",borderRadius:10,padding:14,marginBottom:20,fontSize:13,color:"var(--muted)",lineHeight:1.7}}>
        <strong style={{color:"var(--gold)"}}>How this works:</strong> Paste your lyrics, choose your characters and video length. HitWizard reads the lyrics, figures out which lines need performance shots and which need story scenes, calculates exactly how many clips you need, and writes every single Grok prompt for you — with your characters' full descriptions already included. Then paste all prompts into one Grok chat session.
      </div>
      <div className="card card-glow" style={{marginBottom:20}}>
        <div className="st" style={{marginBottom:16}}>Video Setup</div>
        <ErrBox msg={err}/>
        <div className="field"><label className="lbl">Song Title</label><input className="inp" placeholder="e.g. Heaven In Your Eyes" value={form.songTitle} onChange={e=>f("songTitle",e.target.value)}/></div>
        <div className="field">
          <label className="lbl">Video Type</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8}}>
            {videoTypes.map(vt=>(
              <div key={vt.id} onClick={()=>f("videoType",vt.id)} style={{padding:"10px 12px",borderRadius:8,border:`1px solid ${form.videoType===vt.id?"var(--gold)":"rgba(255,184,0,.15)"}`,background:form.videoType===vt.id?"rgba(255,184,0,.1)":"rgba(8,8,14,.5)",cursor:"pointer",transition:"all .2s"}}>
                <div style={{fontSize:12,fontWeight:700,color:form.videoType===vt.id?"var(--gold)":"var(--txt)"}}>{vt.label}</div>

          </div>
        </div>
        {form.videoType==="full-mv"&&(
          <div className="field"><label className="lbl">Song Duration (seconds) <span className="lbl-n">— e.g. 210 for a 3:30 song</span></label><input className="inp" type="number" value={form.duration} onChange={e=>f("duration",e.target.value)}/></div>

        </div>
        <div className="field">
          <label className="lbl">Characters in This Video <span className="lbl-n">— select all who appear</span></label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8}}>
            {DEFAULT_CHARACTERS.map(c=>(
              <div key={c.id} onClick={()=>toggleChar(c.id)} style={{padding:"10px 12px",borderRadius:8,border:`1px solid ${form.selectedChars.includes(c.id)?c.color+"60":"rgba(255,255,255,.08)"}`,background:form.selectedChars.includes(c.id)?c.color+"15":"rgba(8,8,14,.5)",cursor:"pointer",transition:"all .2s",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>{c.emoji}</span>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:form.selectedChars.includes(c.id)?"var(--txt)":"var(--muted)"}}>{c.name}</div>
                  <div style={{fontSize:10,color:"var(--muted)"}}>{c.role}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="field">
          <label className="lbl">Song Lyrics <span className="lbl-n">— required. The AI reads these to plan your video.</span></label>
          <textarea className="txa" placeholder="Paste your full lyrics here. Include section labels like [Verse 1], [Chorus], [Bridge] if you have them." value={form.lyrics} onChange={e=>f("lyrics",e.target.value)} style={{minHeight:160,fontFamily:"JetBrains Mono,monospace",fontSize:12,lineHeight:1.8}}/>
        </div>
        <button className="btn btn-pur btn-full" onClick={generate} disabled={loading}>
          {loading?<><span className="loader"/> Reading lyrics and writing your shooting script...</>:"🎬 Generate My Shooting Script"}
        </button>
      </div>

      {results&&(
        <div style={{animation:"fadeUp .4s ease"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
            {[{v:results.totalClips,l:"Total Clips",ic:"🎬"},{v:results.arollCount,l:"Performance",ic:"🎤"},{v:results.brollCount,l:"Story Scenes",ic:"🎭"},{v:`${results.totalSeconds}s`,l:"Video Length",ic:"⏱"}].map((s,i)=>(
              <div key={i} className="stat"><div style={{display:"flex",justifyContent:"space-between"}}><div className="sv" style={{fontSize:20}}>{s.v}</div><span style={{fontSize:18}}>{s.ic}</span></div><div className="sl">{s.l}</div></div>
            ))}
          </div>

          {results.grokInstructions&&(
            <div className="rbox rbox-ok" style={{marginBottom:16}}>
              <div className="rbox-lbl" style={{color:"var(--ok)"}}>📋 HOW TO USE THESE PROMPTS IN GROK</div>
              <div className="rbox-txt" style={{paddingRight:0}}>{results.grokInstructions}</div>
            </div>

  );
}

// ── BUDGET PLANNER ──
function BudgetPlanner({addHistory,st}){
  const[form,setForm]=useState({budget:"",goal:"streams",genre:"",audience:"",platforms:["meta","tiktok","youtube"],timeline:"30",experience:"beginner"});
  const[results,setResults]=useState(null);
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[dlData,setDlData]=useState(null);
  const plats={meta:"📘 Facebook & Instagram",tiktok:"🎵 TikTok",youtube:"▶️ YouTube",spotify:"🟢 Spotify Ads",radio:"📻 Radio & PR"};
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  const toggle=p=>setForm(f=>({...f,platforms:f.platforms.includes(p)?f.platforms.filter(x=>x!==p):[...f.platforms,p]}));

  const analyze=async()=>{
    if(!form.budget||Number(form.budget)<10){setErr("Please enter a budget of at least $10.");return;}
    if(!form.platforms.length){setErr("Please select at least one platform.");return;}
    setErr("");setLoading(true);setResults(null);
    try{
      const raw=await hwAI(
        "You are a music marketing budget expert. Give realistic data-driven spending advice. Use plain language. Respond ONLY with valid JSON.",
        `Plan a music marketing budget:
Total: $${form.budget} | Goal: ${form.goal} | Genre: ${form.genre||"Not specified"}
Audience: ${form.audience||"General fans"} | Platforms: ${form.platforms.join(", ")}
Timeline: ${form.timeline} days | Experience: ${form.experience}
Return ONLY this JSON:
{"summary":"2-3 sentence plain English strategy summary","allocation":[{"platform":"name","amount":0,"percentage":0,"rationale":"why this amount"}],"dailyBudget":"how much to spend per day and when","weeklyPlan":{"week1":"week 1 focus","week2":"week 2 focus","week3":"week 3 focus","week4":"week 4 focus"},"expectedResults":{"streams":"realistic stream estimate","reach":"realistic reach estimate","followers":"realistic follower growth","costPerStream":"estimated cost per stream"},"doList":["do this","do this","do this","do this","do this"],"dontList":["avoid this","avoid this","avoid this"],"proTip":"one advanced tip most artists never think of","warning":"the single biggest money-wasting mistake for this scenario"}`
      );
      const p=parseJ(raw);
      setResults(p);
      addHistory({type:"budget",icon:"💰",title:`$${form.budget} Plan`,sub:`${form.goal} · ${form.timeline} days`,date:new Date().toLocaleDateString(),color:"var(--ok)"});
      st("Budget plan ready!","💰");
    }catch(e){setErr(`Something went wrong: ${e.message}`);}
    setLoading(false);
  };

  return(
    <div>
      {dlData&&<DownloadModal content={dlData.c} filename={dlData.n} onClose={()=>setDlData(null)}/>}
      <div className="card card-ok" style={{marginBottom:20}}>
        <div className="st" style={{marginBottom:16}}>Your Budget Details</div>
        <ErrBox msg={err}/>
        <div className="g2">
          <div className="field"><label className="lbl">Total Budget in USD *</label><input className="inp" type="number" min="10" placeholder="e.g. 200" value={form.budget} onChange={e=>f("budget",e.target.value)}/></div>
          <div className="field"><label className="lbl">How Long to Run It</label>
            <select className="sel" value={form.timeline} onChange={e=>f("timeline",e.target.value)}>
              <option value="7">7 Days — Quick Sprint</option>
              <option value="14">14 Days — Standard</option>
              <option value="30">30 Days — Full Campaign</option>
              <option value="60">60 Days — Extended Push</option>
              <option value="90">90 Days — Long Game</option>
            </select>
          </div>
        </div>
        <div className="g2">
          <div className="field"><label className="lbl">Your Main Goal</label>
            <select className="sel" value={form.goal} onChange={e=>f("goal",e.target.value)}>
              <option value="streams">More Spotify Streams</option>
              <option value="followers">Grow Social Following</option>
              <option value="youtube">YouTube Views</option>
              <option value="awareness">Get My Name Out There</option>
              <option value="release">Push a New Release</option>
            </select>
          </div>
          <div className="field"><label className="lbl">Your Experience Level</label>
            <select className="sel" value={form.experience} onChange={e=>f("experience",e.target.value)}>
              <option value="beginner">First time running ads</option>
              <option value="intermediate">Done this a few times</option>
              <option value="advanced">I know the platforms well</option>
            </select>
          </div>
        </div>
        <div className="g2">
          <div className="field"><label className="lbl">Genre</label><input className="inp" placeholder="e.g. Pop, R&B" value={form.genre} onChange={e=>f("genre",e.target.value)}/></div>
          <div className="field"><label className="lbl">Who You Are Targeting</label><input className="inp" placeholder="e.g. Women 25-45, fans of Adele" value={form.audience} onChange={e=>f("audience",e.target.value)}/></div>
        </div>
        <div className="field">
          <label className="lbl">Which Platforms to Spend On</label>
          <div className="pill-row">{Object.entries(plats).map(([k,v])=><div key={k} className={`pill ${form.platforms.includes(k)?"on":""}`} onClick={()=>toggle(k)}>{v}</div>)}</div>
        </div>
        <button className="btn btn-ok btn-full" onClick={analyze} disabled={loading}>
          {loading?<><span className="loader"/> Calculating your plan...</>:"💰 Plan My Budget"}
        </button>
      </div>
      {results&&(
        <div style={{animation:"fadeUp .4s ease"}}>
          {results.summary&&<div className="rbox rbox-ok" style={{marginBottom:14}}><div className="rbox-lbl" style={{color:"var(--ok)"}}>📊 Your Strategy in Plain English</div><div className="rbox-txt" style={{fontWeight:500,paddingRight:0}}>{results.summary}</div></div>}
          {results.allocation?.length>0&&(
            <div className="card" style={{marginBottom:14}}>
              <div className="st" style={{marginBottom:12,fontSize:13}}>Where Your Money Goes</div>
              {results.allocation.map((a,i)=>(
                <div key={i} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:13,fontWeight:600,color:"var(--txt)"}}>{a.platform}</span>
                    <span style={{fontFamily:"JetBrains Mono,monospace",color:"var(--gold)",fontSize:13}}>${a.amount} ({a.percentage}%)</span>
                  </div>
                  <div style={{height:5,background:"rgba(255,184,0,.1)",borderRadius:3,overflow:"hidden",marginBottom:3}}>
                    <div style={{height:"100%",width:`${Math.min(a.percentage,100)}%`,background:"linear-gradient(90deg,var(--gold),var(--purple))",borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:11,color:"var(--muted)"}}>{a.rationale}</div>
                </div>
              ))}
            </div>
          )}
          {results.expectedResults&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:14}}>
              {[["Streams",results.expectedResults.streams,"🎵"],["Reach",results.expectedResults.reach,"👁"],["New Followers",results.expectedResults.followers,"👥"],["Cost Per Stream",results.expectedResults.costPerStream,"💸"]].map(([l,v,ic])=>(
                <div key={l} className="stat"><div style={{display:"flex",justifyContent:"space-between"}}><div className="sv" style={{fontSize:18}}>{ic}</div></div><div style={{fontSize:12,fontWeight:600,color:"var(--gold)",marginTop:5}}>{v}</div><div className="sl">{l}</div></div>
              ))}
            </div>
          )}
          <RBox label="Daily Spending Plan" value={results.dailyBudget} icon="📅" st={st}/>
          {results.weeklyPlan&&[["Week 1",results.weeklyPlan.week1],["Week 2",results.weeklyPlan.week2],["Week 3",results.weeklyPlan.week3],["Week 4",results.weeklyPlan.week4]].map(([l,v])=><RBox key={l} label={l} value={v} icon="📋" st={st}/>)}
          {results.doList&&<div className="card" style={{marginBottom:11}}><div className="st" style={{marginBottom:11,fontSize:13,color:"var(--ok)"}}>✓ Do These Things</div>{results.doList.map((item,i)=><div key={i} style={{display:"flex",gap:9,padding:"6px 0",borderBottom:i<results.doList.length-1?"1px solid rgba(0,229,153,.08)":"none"}}><span style={{color:"var(--ok)",fontSize:12}}>✓</span><span style={{fontSize:12,color:"var(--txt)"}}>{item}</span></div>)}</div>}
          {results.dontList&&<div className="card card-err" style={{marginBottom:11}}><div className="st" style={{marginBottom:11,fontSize:13,color:"var(--err)"}}>✗ Avoid These</div>{results.dontList.map((item,i)=><div key={i} style={{display:"flex",gap:9,padding:"6px 0",borderBottom:i<results.dontList.length-1?"1px solid rgba(255,68,102,.08)":"none"}}><span style={{color:"var(--err)",fontSize:12}}>✗</span><span style={{fontSize:12,color:"var(--txt)"}}>{item}</span></div>)}</div>}
          <RBox label="Pro Tip" value={results.proTip} icon="💡" st={st}/>
          <RBox label="⚠️ Most Important Warning" value={results.warning} warn={true} icon="⚠️" st={st}/>
          <div className="dl-bar">
            <button className="btn btn-ghost btn-sm" onClick={()=>setDlData({c:toText(results,`Budget Plan - $${form.budget}`),n:"hitwizard-budget.txt"})}>⬇ Save Budget Plan</button>
          </div>
        </div>
      )}
    </div>
  );
}


// ── HISTORY ──
function History({history,clearHistory}){
  const tl={campaign:"Ad Campaign",pitch:"Playlist Pitch",content:"Content Set",epk:"EPK",hook:"Hook Lab",budget:"Budget Plan",video:"Shooting Script"};
  return(
    <div>
      <div className="sh">
        <div className="st">Everything You Have Created</div>
        {history.length>0&&<button className="btn btn-danger btn-sm" onClick={clearHistory}>Clear All</button>}
      </div>
      <div className="g4" style={{marginBottom:20}}>
        {["campaign","pitch","content","epk"].map(type=>(
          <div className="stat" key={type}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <div className="sv">{history.filter(h=>h.type===type).length}</div>
              <span style={{fontSize:19}}>{{campaign:"⚡",pitch:"🎯",content:"✦",epk:"📄"}[type]}</span>
            </div>
            <div className="sl">{tl[type]}s</div>
          </div>
        ))}
      </div>
      <div className="card">
        {history.length===0?(
          <div style={{textAlign:"center",padding:"44px 0",color:"var(--muted)"}}>
            <div style={{fontSize:38,marginBottom:11}}>📂</div>
            <div style={{fontFamily:"Cinzel,serif",fontSize:14,marginBottom:5,color:"var(--txt)"}}>Nothing Here Yet</div>
            <div style={{fontSize:12}}>Everything you create across all eight weapons will be logged here.</div>
          </div>
        ):history.map((item,i)=>(
          <div key={i} className="hi">
            <div style={{width:32,height:32,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,background:`${item.color}18`,border:`1px solid ${item.color}30`}}>{item.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:"var(--txt)"}}>{item.title}</div>
              <div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{item.sub}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:9,flexShrink:0}}>
              <span className="badge b-gold">{tl[item.type]||item.type}</span>
              <span style={{fontSize:10,color:"var(--muted)",fontFamily:"JetBrains Mono,monospace"}}>{item.date}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── PRICING ──

  const tiers=[
    {name:"First Mate",price:15,desc:"For artists just starting out",feat:false,features:["5 campaigns per month","10 playlist pitches","20 content sets","1 EPK per month","Hook Lab — 3 sessions","Budget Planner","Save and export everything","Email support"]},
    {name:"Captain",price:49,desc:"For serious artists scaling up",feat:true,features:["Unlimited everything","Character Vault — all 5 characters","Video Production Engine","Shooting script generator","Priority AI speed","All export formats","Priority support","First access to new features"]},
    {name:"Admiral",price:149,desc:"For managers and small labels",feat:false,features:["Everything in Captain","Up to 10 artist profiles","Team access","White-label exports","Custom pitch templates","Dedicated account manager","API access coming soon"]},
  ];
  return(
    <div>
      <div style={{textAlign:"center",marginBottom:32,animation:"fadeUp .5s ease"}}>
        <div style={{fontFamily:"Cinzel,serif",fontSize:24,fontWeight:900,color:"var(--txt)",marginBottom:7}}>Choose Your <span style={{background:"linear-gradient(135deg,#FFB800,#FF8C00)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Rank</span></div>
        <div style={{color:"var(--muted)",fontSize:13}}>From emerging artist to fleet commander</div>
      </div>
      <div className="g3" style={{marginBottom:26}}>
        {tiers.map((tier,i)=>(
          <div key={i} className={`pc ${tier.feat?"feat":""}`}>
            {tier.feat&&<div className="pc-pop">MOST POPULAR</div>}
            <div style={{marginTop:tier.feat?20:0}}>
              <div style={{fontFamily:"Cinzel,serif",fontSize:14,fontWeight:700,color:"var(--txt)",marginBottom:4}}>{tier.name}</div>
              <div className="pc-val">${tier.price}<span>/mo</span></div>
              <div style={{fontSize:12,color:"var(--muted)",margin:"4px 0 12px"}}>{tier.desc}</div>
              <ul className="pc-list">{tier.features.map((ff,j)=><li key={j}>{ff}</li>)}</ul>
              <button className={`btn ${tier.feat?"btn-gold":"btn-out"} btn-full`} onClick={()=>st("Payments launching soon — stay tuned!","👑")}>
                {tier.feat?"⚡ Choose Captain":`Choose ${tier.name}`}
              </button>
            </div>
          </div>
        ))}
      </div>
      <div className="card" style={{textAlign:"center",border:"1px solid rgba(123,47,190,.3)"}}>
        <div style={{fontFamily:"Cinzel,serif",fontSize:16,fontWeight:700,marginBottom:5}}>Fleet Commander</div>
        <div style={{color:"var(--muted)",fontSize:13,marginBottom:13}}>For agencies and companies managing 10 or more artists. Custom pricing and full white-label options.</div>
        <button className="btn btn-out" onClick={()=>st("Contact us at captain@hitwizard.ai","👑")}>Get in Touch</button>
      </div>
    </div>
  );
}

// ── MAIN APP ──
function HitWizard(){
  const[page,setPage]=useState("dashboard");
  const[history,setHistory]=useState([]);
  const[toast,setToast]=useState(null);
  const[open,setOpen]=useState(false);
  const addHistory=useCallback((item)=>setHistory(h=>[item,...h.slice(0,99)]),[]);
  const st=useCallback((msg,icon)=>setToast({msg,icon}),[]);
  const clearHistory=()=>{setHistory([]);st("History cleared","✓");};

  const nav=[
    {id:"dashboard",icon:"⬡",label:"War Room"},
    {id:"campaigns",icon:"⚡",label:"Ad Campaign Forge"},
    {id:"pitches",icon:"🎯",label:"Playlist Strike"},
    {id:"content",icon:"✦",label:"Content Arsenal"},
    {id:"epk",icon:"📄",label:"EPK Generator"},
    {id:"hooklab",icon:"🎣",label:"Hook Lab"},
    {id:"budget",icon:"💰",label:"Budget Planner"},
    {id:"video",icon:"🎬",label:"Video Engine"},
    {id:"vault",icon:"🧬",label:"Character Vault"},
    {id:"history",icon:"📂",label:"My History"},
    {id:"pricing",icon:"👑",label:"Plans & Pricing"},
  ];

  const titles={
    dashboard:{t:"War Room",s:"Your AI music marketing command center"},
    campaigns:{t:"Ad Campaign Forge",s:"Build complete campaigns for Facebook, Instagram, TikTok and YouTube"},
    pitches:{t:"Playlist Strike",s:"Pitch your song to Spotify curators with emails that actually get opened"},
    content:{t:"Content Arsenal",s:"Social media content for every platform — all from your lyrics"},
    epk:{t:"EPK Generator",s:"Professional press kit for blogs, magazines, podcasts and labels"},
    hooklab:{t:"Hook Lab",s:"Find the first 3 seconds that make someone stop scrolling"},
    budget:{t:"Budget Planner",s:"Know exactly where every dollar goes before you spend a cent"},
    video:{t:"Video Engine",s:"Complete Grok shooting scripts — every prompt written, every character included"},
    vault:{t:"Character Vault",s:"Store your characters — DNA automatically added to every video prompt"},
    history:{t:"My History",s:"Everything you have created"},
    pricing:{t:"Plans and Pricing",s:"Choose the rank that fits where you are"},
  };

  const props={addHistory,st};

  const renderPage=()=>{
    switch(page){
      case"dashboard":return <Dashboard onNav={setPage} history={history}/>;
      case"campaigns":return <CampaignForge {...props}/>;
      case"pitches":return <PlaylistStrike {...props}/>;
      case"content":return <ContentArsenal {...props}/>;
      case"epk":return <EPKGenerator {...props}/>;
      case"hooklab":return <HookLab {...props}/>;
      case"budget":return <BudgetPlanner {...props}/>;
      case"video":return <VideoEngine showToast={st}/>;
      case"vault":return <CharacterVault showToast={st}/>;
      case"history":return <History history={history} clearHistory={clearHistory}/>;
      case"pricing":return <Pricing st={st}/>;
      default:return <Dashboard onNav={setPage} history={history}/>;
    }
  };

  return(
    <div className="hw">
      <div className="gbg"/><div className="orb1"/><div className="orb2"/>
      <button className="tog" onClick={()=>setOpen(o=>!o)}>☰</button>
      <div className={`ov ${open?"open":""}`} onClick={()=>setOpen(false)}/>
      <nav className={`side ${open?"open":""}`}>
        <div className="slogo">
          <span className="lmark">HITWIZARD</span>
          <span className="lsub">AI Music Marketing</span>
        </div>
        <div className="snav">
          <div className="nlbl">Your Weapons</div>
          {nav.slice(0,9).map(item=>(
            <button key={item.id} className={`nb ${page===item.id?"on":""}`} onClick={()=>{setPage(item.id);setOpen(false);}}>
              <span className="ni">{item.icon}</span>
              <span>{item.label}</span>
            </button>
          ))}
          <div className="nlbl" style={{marginTop:8}}>Account</div>
          {nav.slice(9).map(item=>(
            <button key={item.id} className={`nb ${page===item.id?"on":""}`} onClick={()=>{setPage(item.id);setOpen(false);}}>
              <span className="ni">{item.icon}</span>
              <span>{item.label}</span>
              {item.id==="history"&&history.length>0&&<span className="nbdg">{history.length}</span>}
            </button>
          ))}
        </div>
        <div className="sfoot">
          <div className="ucard">
            <div className="uav">K</div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:"var(--txt)"}}>Captain Kiko</div>
              <div style={{fontSize:9,color:"var(--gold)",fontFamily:"JetBrains Mono,monospace",letterSpacing:1}}>MAXIMUM READINESS</div>
            </div>
          </div>
        </div>
      </nav>
      <main className="main">
        <div className="topbar">
          <div>
            <div className="pgt">{titles[page]?.t}</div>
            <div className="pgs">{titles[page]?.s}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <span className="badge b-gold">✦ Phase 1</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPage("pricing")}>👑 Upgrade</button>
          </div>
        </div>
        <div className="content">{renderPage()}</div>
      </main>
      {toast&&<Toast msg={toast.msg} icon={toast.icon} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.render(<HitWizard/>, document.getElementById("root"));
</script>
