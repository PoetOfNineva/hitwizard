<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HitWizard — Command Bridge</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131a;
    --border: rgba(255,184,0,.15);
    --gold: #FFB800;
    --txt: #e8e8f0;
    --muted: #666680;
    --ok: #00d4aa;
    --err: #FF6B6B;
    --purple: #8B5CF6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--txt); font-family: system-ui, sans-serif; min-height: 100vh; }
  
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 16px;
  }
  .login-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px; width: 360px; text-align: center;
  }
  .login-card h1 { color: var(--gold); font-size: 22px; margin-bottom: 8px; }
  .login-card p { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .login-card input {
    width: 100%; padding: 12px 16px; border-radius: 10px;
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    color: var(--txt); font-size: 14px; margin-bottom: 12px;
  }
  .btn-gold {
    width: 100%; padding: 13px; border-radius: 10px;
    background: var(--gold); color: #000; font-weight: 800;
    font-size: 14px; border: none; cursor: pointer; letter-spacing: 0.5px;
  }
  .btn-gold:hover { opacity: 0.9; }

  #dashboard { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .top-bar h1 { color: var(--gold); font-size: 20px; }
  .top-bar span { color: var(--muted); font-size: 13px; }
  .refresh-btn {
    background: rgba(255,184,0,.1); border: 1px solid var(--border);
    color: var(--gold); padding: 8px 16px; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 600;
  }

  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; text-align: center;
  }
  .stat-card .num { font-size: 36px; font-weight: 800; color: var(--gold); line-height: 1; }
  .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card.green .num { color: var(--ok); }
  .stat-card.red .num { color: var(--err); }
  .stat-card.purple .num { color: var(--purple); }

  .section { margin-bottom: 28px; }
  .section h2 {
    font-size: 13px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 14px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; padding: 12px 16px; text-align: left;
    border-bottom: 1px solid var(--border); background: rgba(255,255,255,.02);
  }
  td { padding: 13px 16px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,.04); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .badge.free { background: rgba(102,102,128,.2); color: var(--muted); }
  .badge.paid { background: rgba(0,212,170,.15); color: var(--ok); }
  .badge.confirmed { background: rgba(0,212,170,.1); color: var(--ok); }
  .badge.unconfirmed { background: rgba(255,107,107,.1); color: var(--err); }

  .weapon-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;
  }
  .weapon-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; text-align: center;
  }
  .weapon-card .w-num { font-size: 28px; font-weight: 800; color: var(--purple); }
  .weapon-card .w-name { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
  .error-msg { color: var(--err); text-align: center; padding: 20px; font-size: 13px; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <h1>⚔️ Command Bridge</h1>
    <p>HitWizard Admin — Authorized Personnel Only</p>
    <input type="password" id="secret-input" placeholder="Enter admin secret" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-gold" onclick="login()">Enter the Bridge</button>
    <div id="login-err" style="color:var(--err);font-size:12px;margin-top:12px;"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <div>
      <h1>⚔️ HitWizard Command Bridge</h1>
      <span id="last-updated">Loading...</span>
    </div>
    <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
  </div>

  <div id="dash-content"><div class="loading">Loading empire data...</div></div>
</div>

<script>
let ADMIN_SECRET = "";

function login() {
  const secret = document.getElementById("secret-input").value.trim();
  if (!secret) return;
  ADMIN_SECRET = secret;
  document.getElementById("login-err").textContent = "";
  loadDashboard();
}

async function loadDashboard() {
  document.getElementById("dash-content").innerHTML = '<div class="loading">⚔️ Fetching empire data...</div>';
  try {
    const resp = await fetch("/.netlify/functions/admin-dashboard", {
      headers: { "x-admin-secret": ADMIN_SECRET }
    });
    if (resp.status === 401) {
      document.getElementById("login-err").textContent = "Wrong secret. Access denied.";
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("dashboard").style.display = "none";
      return;
    }
    if (!resp.ok) throw new Error("Server error " + resp.status);
    const data = await resp.json();

    // Show dashboard
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("last-updated").textContent =
      "Last updated: " + new Date().toLocaleTimeString();

    renderDashboard(data);
  } catch(e) {
    document.getElementById("dash-content").innerHTML =
      '<div class="error-msg">Error loading data: ' + e.message + '</div>';
  }
}

function renderDashboard(data) {
  const { stats, weaponBreakdown, users, recentSignups } = data;

  const weaponNames = {
    campaign: "⚡ Campaign",
    pitch: "📧 Playlist Strike",
    content: "📝 Content Arsenal",
    epk: "📋 EPK Generator",
    hook: "🪝 Hook Lab",
    budget: "💰 Budget Planner",
    video: "🎬 Video Engine"
  };

  const weaponHTML = Object.entries(weaponBreakdown || {})
    .sort((a,b) => b[1] - a[1])
    .map(([type, count]) => `
      <div class="weapon-card">
        <div class="w-num">${count}</div>
        <div class="w-name">${weaponNames[type] || type}</div>
      </div>
    `).join("") || '<div style="color:var(--muted);padding:20px;font-size:13px">No generations yet</div>';

  const usersHTML = (users || []).map(u => `
    <tr>
      <td style="color:var(--gold)">${u.email || "-"}</td>
      <td>${u.name || "-"}</td>
      <td><span class="badge ${u.tier === 'free' ? 'free' : 'paid'}">${u.tier}</span></td>
      <td><span class="badge ${u.confirmed ? 'confirmed' : 'unconfirmed'}">${u.confirmed ? "✓ confirmed" : "⚠ unconfirmed"}</span></td>
      <td style="color:var(--purple)">${u.generations}</td>
      <td style="color:var(--muted);font-size:11px">${u.provider}</td>
      <td style="color:var(--muted);font-size:11px">${formatDate(u.created_at)}</td>
      <td style="color:var(--muted);font-size:11px">${u.last_sign_in ? formatDate(u.last_sign_in) : "never"}</td>
    </tr>
  `).join("");

  document.getElementById("dash-content").innerHTML = `
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="num">${stats.totalUsers}</div>
        <div class="lbl">Total Users</div>
      </div>
      <div class="stat-card green">
        <div class="num">${stats.confirmedUsers}</div>
        <div class="lbl">Confirmed</div>
      </div>
      <div class="stat-card purple">
        <div class="num">${stats.paidUsers}</div>
        <div class="lbl">Paid Users</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.freeUsers}</div>
        <div class="lbl">Free Users</div>
      </div>
      <div class="stat-card green">
        <div class="num">${stats.newToday}</div>
        <div class="lbl">New Today</div>
      </div>
      <div class="stat-card green">
        <div class="num">${stats.newThisWeek}</div>
        <div class="lbl">New This Week</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.generationsToday}</div>
        <div class="lbl">Gens Today</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.totalGenerations}</div>
        <div class="lbl">Total Generations</div>
      </div>
    </div>

    <!-- WEAPON BREAKDOWN -->
    <div class="section">
      <h2>⚔️ Weapon Usage Breakdown</h2>
      <div class="weapon-grid">${weaponHTML}</div>
    </div>

    <!-- ALL USERS -->
    <div class="section">
      <h2>👥 All Users (${stats.totalUsers})</h2>
      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Email</th><th>Name</th><th>Tier</th>
              <th>Status</th><th>Generations</th>
              <th>Provider</th><th>Joined</th><th>Last Seen</th>
            </tr>
          </thead>
          <tbody>${usersHTML || '<tr><td colspan="8" style="color:var(--muted);text-align:center;padding:20px">No users yet</td></tr>'}</tbody>
        </table>
      </div>
    </div>
  `;
}

function formatDate(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

// Auto-refresh every 60 seconds when dashboard is visible
setInterval(() => {
  if (document.getElementById("dashboard").style.display !== "none" && ADMIN_SECRET) {
    loadDashboard();
  }
}, 60000);
</script>
</body>
</html>
